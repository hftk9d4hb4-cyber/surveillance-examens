name: Qualité

on:
  pull_request:
  push:
    branches:
      - feature/v1.2-mp01-stabilisation

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/surveillance?schema=public
      DATABASE_URL_UNPOOLED: postgresql://user:pass@localhost:5432/surveillance?schema=public
      NEXTAUTH_SECRET: ci-only-secret-ci-only-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check:hygiene
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
